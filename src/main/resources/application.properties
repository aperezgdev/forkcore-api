spring.application.name=api
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/forkcore}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:forkcore}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:forkcore}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
orders.idempotency.retention=${ORDERS_IDEMPOTENCY_RETENTION:PT24H}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# OpenAPI / Swagger UI
springdoc.api-docs.path=/openapi
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.version=openapi_3_1

# Logging
logging.level.root=INFO
logging.level.com.forkcore=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.flywaydb=WARN
